app = "maruszp-frontend"
primary_region = "fra"

[build]
  [build.args]
    VITE_API_URL = "https://maruszp-backend.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
