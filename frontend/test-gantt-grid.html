<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gantt Preview - Grid</title>
  <style>
    :root {
      --bg: #eef2f5;
      --surface: #ffffff;
      --surface-soft: #f7f9fb;
      --line: #d7e0e8;
      --line-soft: #e9eef3;
      --text: #37495a;
      --muted: #6d8091;
      --header: #d8edf8;
      --header-soft: #eef7fc;
      --day-separator: #c7d9e4;
      --work-zone: rgba(250, 245, 220, 0.92);
      --row-hover: #eef3f8;
      --selected: #e8edf3;
      --blue: #46c0ea;
      --blue-dark: #24addb;
      --red: #ff6a6a;
      --red-dark: #de4d4d;
      --deadline: #ff5c5c;
      --today: #7d95a9;
      --shadow: 0 10px 30px rgba(33, 52, 73, 0.08);
      --left-width: 420px;
      --slots: 20;
      --slot-width: calc(100% / var(--slots));
      --row-height: 30px;
      --group-height: 36px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #274f6f 0 7px, transparent 7px),
        linear-gradient(180deg, #f4f7fa 0%, var(--bg) 100%);
    }

    .page {
      padding: 10px;
    }

    .shell {
      border: 1px solid #cad5de;
      background: var(--surface-soft);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .board {
      min-width: 1840px;
      display: grid;
      grid-template-columns: var(--left-width) 1fr;
    }

    .left-pane {
      border-right: 1px solid #cfd8e1;
      background: var(--surface);
    }

    .right-pane {
      background: var(--surface);
    }

    .topbar-left,
    .topbar-right {
      height: 34px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--line-soft);
      background: #f7f9fb;
    }

    .topbar-left {
      justify-content: space-between;
      padding: 0 12px;
    }

    .topbar-left strong {
      font-size: 12px;
      font-weight: 600;
      color: #526476;
    }

    .icon-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #8a9aaa;
      font-size: 12px;
    }

    .topbar-right {
      padding: 0;
    }

    .days {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      font-size: 11px;
      color: #6b879b;
    }

    .day {
      height: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--header);
      border-left: 1px solid var(--day-separator);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .left-head,
    .hours {
      height: 34px;
      border-bottom: 1px solid var(--line);
    }

    .left-head {
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: #465b6d;
      background: #f2f5f8;
    }

    .hours {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      background: linear-gradient(180deg, var(--header-soft) 0%, #f8fbfd 100%);
      color: #7990a3;
      font-size: 10px;
    }

    .hour {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid #d8e5ee;
    }

    .grid-body {
      position: relative;
      display: grid;
      grid-template-columns: var(--left-width) 1fr;
    }

    .grid-body::after {
      content: "";
      position: absolute;
      left: calc(var(--left-width) + (var(--slot-width) * 3));
      top: 0;
      width: calc(var(--slot-width) * 5);
      bottom: 0;
      background: linear-gradient(90deg, rgba(250, 245, 220, 0.3), var(--work-zone), rgba(250, 245, 220, 0.3));
      pointer-events: none;
      z-index: 0;
    }

    .rows-left,
    .rows-right {
      position: relative;
      z-index: 1;
    }

    .group-left,
    .group-right {
      height: var(--group-height);
      border-bottom: 1px solid var(--line);
      background: #f1f4f7;
    }

    .group-left {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: #42586b;
    }

    .group-right {
      border-left: 1px solid #edf2f6;
      background:
        linear-gradient(90deg,
          transparent 0,
          transparent calc(20% - 1px),
          var(--day-separator) calc(20% - 1px),
          var(--day-separator) 20%,
          transparent 20%,
          transparent calc(40% - 1px),
          var(--day-separator) calc(40% - 1px),
          var(--day-separator) 40%,
          transparent 40%,
          transparent calc(60% - 1px),
          var(--day-separator) calc(60% - 1px),
          var(--day-separator) 60%,
          transparent 60%,
          transparent calc(80% - 1px),
          var(--day-separator) calc(80% - 1px),
          var(--day-separator) 80%,
          transparent 80%);
    }

    .row-left,
    .row-right {
      height: var(--row-height);
      border-bottom: 1px solid var(--line-soft);
      transition: background-color 140ms ease;
    }

    .row-left {
      display: flex;
      align-items: center;
      padding: 0 12px 0 28px;
      background: var(--surface);
      font-size: 12px;
    }

    .row-left.overdue {
      color: var(--red-dark);
    }

    .row-left.selected,
    .row-right.selected {
      background: var(--selected);
    }

    .row-left:hover,
    .row-right:hover {
      background: var(--row-hover);
    }

    .task-code {
      color: inherit;
    }

    .row-right {
      position: relative;
      border-left: 1px solid #edf2f6;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent calc(var(--slot-width) - 1px),
          rgba(215, 224, 232, 0.62) calc(var(--slot-width) - 1px),
          rgba(215, 224, 232, 0.62) var(--slot-width)
        );
      overflow: hidden;
    }

    .row-right .day-split {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--day-separator);
      opacity: 0.9;
      z-index: 1;
    }

    .task-bar {
      position: absolute;
      top: 4px;
      height: 22px;
      display: flex;
      align-items: center;
      min-width: 30px;
      z-index: 3;
    }

    .task-bar .shape {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%);
    }

    .task-bar.blue .shape {
      background: var(--blue);
    }

    .task-bar.red .shape {
      background: var(--red);
    }

    .task-bar.dark .shape {
      background: var(--red-dark);
    }

    .task-bar .progress {
      position: absolute;
      top: 7px;
      bottom: 7px;
      left: 58%;
      right: 16px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 3px;
      z-index: 4;
    }

    .deadline {
      position: absolute;
      top: 2px;
      width: 4px;
      height: 26px;
      background: var(--deadline);
      z-index: 4;
    }

    .today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(125, 149, 169, 0.45);
      z-index: 2;
    }

    .today-chip {
      position: absolute;
      top: 6px;
      transform: translateX(-50%);
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #dbe4ec;
      font-size: 10px;
      color: #73879a;
      z-index: 5;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
      font-size: 11px;
      color: var(--muted);
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .scroll-mock {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8e99a4;
    }

    .track {
      width: 74px;
      height: 8px;
      border-radius: 999px;
      background: #d5dce3;
      position: relative;
    }

    .thumb {
      position: absolute;
      right: 12px;
      width: 34px;
      height: 8px;
      border-radius: 999px;
      background: #8d949b;
    }

    @media (max-width: 1100px) {
      .page {
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <div class="board">
        <div class="left-pane">
          <div class="topbar-left">
            <strong>План виробництва</strong>
            <div class="icon-row">🖨️ 🔎 ⤢</div>
          </div>
          <div class="left-head">Задачі</div>
        </div>

        <div class="right-pane">
          <div class="topbar-right">
            <div class="days" id="days"></div>
          </div>
          <div class="hours" id="hours"></div>
        </div>
      </div>

      <div class="grid-body">
        <div class="rows-left" id="rowsLeft"></div>
        <div class="rows-right" id="rowsRight"></div>
      </div>

      <div class="footer">
        <div class="legend">
          <span class="legend-item"><span class="swatch" style="background:#46c0ea"></span>Заплановано</span>
          <span class="legend-item"><span class="swatch" style="background:#ff6a6a"></span>Критичні задачі</span>
          <span class="legend-item"><span class="swatch" style="background:#de4d4d"></span>Прострочка</span>
          <span class="legend-item"><span class="swatch" style="background:#ff5c5c;width:4px"></span>Дедлайн</span>
        </div>
        <div class="scroll-mock">
          <span>◀</span>
          <span class="track"><span class="thumb"></span></span>
          <span>▶</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const days = [
      "6 Квітня",
      "7 Квітня",
      "8 Квітня",
      "9 Квітня",
      "10 Квітня",
    ];

    const hoursPattern = ["0:00", "6:00", "12:00", "18:00"];

    const tasks = [
      { name: "KP-24061 Кухня Loft для шоуруму. Запуск у цех.", color: "blue", start: 3.8, length: 2.1, deadline: 8.7 },
      { name: "KP-24077 Стенд профілів. Дніпро. Підтвердження запуску.", color: "blue", start: 3.7, length: 2.0, deadline: 8.65 },
      { name: "KP-24090 Острівна зона продажу. Чернівці.", color: "blue", start: 3.2, length: 2.1, deadline: 8.15 },
      { name: "KP-24105 Вітрина скло/дзеркало. Запуск рахунків.", color: "blue", start: 3.1, length: 2.0, deadline: 8.0 },
      { name: "KP-24112 Шафа Slim Aero. Чернівці.", color: "blue", start: 0.0, length: 5.0, progress: true, deadline: 7.45 },
      { name: "KP-24133 Зона підбору. Львів. Потрібен запуск.", color: "red", start: 0.0, length: 4.4, overdue: true },
      { name: "KP-24148 Зона ViyarFronts. Дніпро 2. Пауза по матеріалах.", color: "red", start: 0.0, length: 4.4, overdue: true },
      { name: "KP-24156 Рекламний стенд. Чернівці. Узгодження рахунків.", color: "red", start: 0.0, length: 4.4, overdue: true },
      { name: "KP-24160 Кухня 23 premium. Модернізація.", color: "red", start: 0.0, length: 4.4, overdue: true },
      { name: "KP-24171 Стенди фасадів. Дніпро. Запуск рахунків.", color: "red", start: 0.0, length: 4.4, overdue: true },
      { name: "KP-24179 Камінь Meredian. Конструктив.", color: "dark", start: 0.0, length: 4.4, overdue: true },
      { name: "KP-24188 Модернізація кухонного наповнення Meredian.", color: "red", start: 0.0, length: 4.4, overdue: true, selected: true },
    ];

    const daysRoot = document.getElementById("days");
    const hoursRoot = document.getElementById("hours");
    const rowsLeft = document.getElementById("rowsLeft");
    const rowsRight = document.getElementById("rowsRight");

    days.forEach((label) => {
      const el = document.createElement("div");
      el.className = "day";
      el.textContent = label;
      daysRoot.appendChild(el);
    });

    for (let i = 0; i < 5; i += 1) {
      hoursPattern.forEach((label) => {
        const el = document.createElement("div");
        el.className = "hour";
        el.textContent = label;
        hoursRoot.appendChild(el);
      });
    }

    const groupLeft = document.createElement("div");
    groupLeft.className = "group-left";
    groupLeft.innerHTML = "<span>10.01. Запуск в роботу (цех)</span><span>▼</span>";
    rowsLeft.appendChild(groupLeft);

    const groupRight = document.createElement("div");
    groupRight.className = "group-right";
    rowsRight.appendChild(groupRight);

    const addDaySplits = (row) => {
      [20, 40, 60, 80].forEach((percent) => {
        const split = document.createElement("span");
        split.className = "day-split";
        split.style.left = percent + "%";
        row.appendChild(split);
      });
    };

    tasks.forEach((task, index) => {
      const leftRow = document.createElement("div");
      leftRow.className = "row-left";
      if (task.overdue) leftRow.classList.add("overdue");
      if (task.selected) leftRow.classList.add("selected");
      leftRow.innerHTML = `<span class="task-code">${task.name}</span>`;
      rowsLeft.appendChild(leftRow);

      const rightRow = document.createElement("div");
      rightRow.className = "row-right";
      if (task.selected) rightRow.classList.add("selected");
      addDaySplits(rightRow);

      const bar = document.createElement("div");
      bar.className = `task-bar ${task.color}`;
      bar.style.left = (task.start * 5) + "%";
      bar.style.width = (task.length * 5) + "%";
      bar.innerHTML = '<span class="shape"></span>';
      if (task.progress) {
        const progress = document.createElement("span");
        progress.className = "progress";
        bar.appendChild(progress);
      }
      rightRow.appendChild(bar);

      if (typeof task.deadline === "number") {
        const deadline = document.createElement("span");
        deadline.className = "deadline";
        deadline.style.left = (task.deadline * 5) + "%";
        rightRow.appendChild(deadline);
      }

      if (index === 4) {
        const todayLine = document.createElement("span");
        todayLine.className = "today-line";
        todayLine.style.left = "10%";
        rightRow.appendChild(todayLine);
      }

      rowsRight.appendChild(rightRow);
    });

    const todayChip = document.createElement("span");
    todayChip.className = "today-chip";
    todayChip.style.left = "calc(420px + 10%)";
    todayChip.textContent = "Сьогодні";
    document.querySelector(".grid-body").appendChild(todayChip);
  </script>
</body>
</html>
